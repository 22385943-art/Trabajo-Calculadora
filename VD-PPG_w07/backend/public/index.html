<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analizador de Regresión - AEC1</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Análisis de Regresión Lineal</h1>
        
        <div class="dashboard">
            <aside class="sidebar">
                
                <section class="card">
                    <h2>1. Carga de Datos</h2>
                    <label>Archivo Local:</label>
                    <input type="file" id="archivoCsv" accept=".csv">
                    
                    <div style="text-align: center; color: #999; margin: 10px 0; font-size: 12px;">— O TAMBIÉN —</div>
                    
                    <label>URL de API:</label>
                    <input type="text" id="inputUrlApi" placeholder="https://api.ejemplo.com/datos">
                    <button id="btnCargarApi">Consultar API</button>
                </section>

                <section class="card">
                    <h2>2. Configuración</h2>
                    <label>Variable X (Independiente):</label>
                    <select id="selectX"></select>
                    
                    <label>Variable Y (Dependiente):</label>
                    <select id="selectY"></select>
                    
                    <button id="btnCalcular">Ejecutar Análisis</button>
                </section>
                
            </aside>

            <main class="main-content">
                
                <section class="card">
                    <h2>Gráfico de Dispersión</h2>
                    <div id="graficoRegresion">
                        <p style="color: #999; text-align: center; padding: 40px;">Carga datos para ver el gráfico</p>
                    </div>
                </section>

                <section class="card">
                    <h2>Resumen Estadístico</h2>
                    <div id="resultadoTexto">
                        <p style="color: #999;">Los coeficientes aparecerán tras el cálculo.</p>
                    </div>
                </section>

                <section class="card">
                    <h2>Vista Previa de la Tabla</h2>
                    <div id="contenedorTabla" style="overflow-x: auto;">
                        </div>
                </section>

            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
