<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Linear Regression (DataTab-style)</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>Linear Regression Tool</h1>
    <p class="subtitle">Upload CSV or fetch from an API • View table • Run regression • Plot results</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>1) Load Data</h2>

      <div class="row">
        <div class="block">
          <label class="label">CSV Upload</label>
          <input id="csvFile" type="file" accept=".csv" />
          <button id="btnUploadCsv">Upload CSV</button>
        </div>

        <div class="block">
          <label class="label">API URL</label>
          <input id="apiUrl" type="text" placeholder="https://example.com/data.json" />
          <button id="btnLoadApi">Load API</button>
        </div>
      </div>

      <div id="status" class="status"></div>
    </section>

    <section class="card">
      <h2>2) Data Table (read-only)</h2>
      <div id="tableWrap" class="table-wrap"></div>
    </section>

    <section class="card">
      <h2>3) Linear Regression</h2>

      <div class="row">
        <div class="block">
          <label class="label">X variable</label>
          <select id="xCol"></select>
        </div>
        <div class="block">
          <label class="label">Y variable</label>
          <select id="yCol"></select>
        </div>
        <div class="block">
          <label class="label">&nbsp;</label>
          <button id="btnRun">Run Regression</button>
        </div>
      </div>

      <div class="row">
        <div class="block grow">
          <h3>Regression Output</h3>
          <div id="regWrap"></div>
        </div>
      </div>

      <div class="row">
        <div class="block grow">
          <h3>Plot</h3>
          <div id="plot" class="plot"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <small>VD - AEC1_w07 • Node/Express + Vanilla JS + Plotly</small>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
